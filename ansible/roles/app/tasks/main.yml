--- # Start of app role tasks.
# This role prepares and deploys the application using GitHub repos.

- name: Create app directory # Folder to host docker-compose.yml.
  file: # Manage file system objects.
    path: /opt/pm-b # Target directory for app files.
    state: directory # Ensure directory exists.
    mode: "0755" # Standard permissions.

- name: Install git # Git is needed to clone GitHub repos.
  apt: # Use apt package manager.
    name: git # Install git package.
    state: present # Ensure git is installed.

- name: Clone backend repo # Download backend source code.
  git: # Use git module.
    repo: "https://github.com/jadliaissam-edu/PM-B-backend.git" # Backend repo URL.
    dest: /opt/pm-b/PM-B-backend # Local folder on server.
    update: yes # Pull latest changes if already cloned.
    force: yes # Always reset local changes to match remote.

- name: Rendre mvnw exécutable # Corrige l'erreur Permission denied sur ./mvnw
  file:
    path: /opt/pm-b/PM-B-backend/mvnw
    mode: '0755'
    state: file

- name: Clone frontend repo # Download frontend source code.
  git: # Use git module.
    repo: "https://github.com/jadliaissam-edu/PM-B-frontend.git" # Frontend repo URL.
    dest: /opt/pm-b/PM-B-frontend # Local folder on server.
    update: yes # Pull latest changes if already cloned.
    force: yes # Always reset local changes to match remote.

- name: Copy backend Dockerfile # Ensure Dockerfile exists on server.
  copy: # Copy a local file to the server.
    src: "{{ playbook_dir }}/../../PM-B-backend/Dockerfile" # Local path.
    dest: /opt/pm-b/PM-B-backend/Dockerfile # Target path on server.
    mode: "0644" # File permissions.

- name: Copy frontend Dockerfile # Ensure Dockerfile exists on server.
  copy: # Copy a local file to the server.
    src: "{{ playbook_dir }}/../../PM-B-frontend/Dockerfile" # Local path.
    dest: /opt/pm-b/PM-B-frontend/Dockerfile # Target path on server.
    mode: "0644" # File permissions.

- name: Copy nginx.conf # Nginx config for the React app.
  copy: # Copy a local file to the server.
    src: "{{ playbook_dir }}/../../PM-B-frontend/nginx.conf" # Local path.
    dest: /opt/pm-b/PM-B-frontend/nginx.conf # Target path on server.
    mode: "0644" # File permissions.

- name: Check backend env file # Ensure secrets exist on controller.
  stat:
    path: "{{ playbook_dir }}/../backend.env"
  delegate_to: localhost
  become: false
  run_once: true
  register: backend_env_file_stat

- name: Fail if backend env file is missing # Prevent broken deploys.
  fail:
    msg: "Missing {{ playbook_dir }}/../backend.env. Create it from backend.env.example before deployment."
  when: not backend_env_file_stat.stat.exists
  become: false
  run_once: true

- name: Copy backend env example # Reference file for operators.
  copy:
    src: "{{ playbook_dir }}/../backend.env.example"
    dest: /opt/pm-b/backend.env.example
    mode: "0644"

- name: Copy backend env file # Runtime secrets/config (gitignored locally).
  copy:
    src: "{{ playbook_dir }}/../backend.env"
    dest: /opt/pm-b/backend.env
    mode: "0600"

- name: Copy docker-compose.yml # Compose file used on the server.
  copy: # Copy a local file to the server.
    src: "{{ playbook_dir }}/../compose/docker-compose.yml" # Local path.
    dest: /opt/pm-b/docker-compose.yml # Target path on server.
    mode: "0644" # File permissions.

- name: Stop existing containers cleanly # Avoid docker-compose recreate bugs.
  command: docker-compose down
  args:
    chdir: /opt/pm-b # Run command inside app folder.

- name: Build and start containers # Run docker-compose on the server.
  command: docker-compose up -d --build # Build images and start containers.
  args:
    chdir: /opt/pm-b # Run command inside app folder.
