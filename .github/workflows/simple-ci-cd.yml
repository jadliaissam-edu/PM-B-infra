name: simple-ci-cd

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      component:
        description: "Partie a redeployer (backend|frontend|ia|all)"
        required: false
        default: "all"

jobs:
  validate:
    name: Validate infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Ansible syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check -i inventory.ini site.yml

  deploy:
    name: Deploy app
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PM_B_INFRA_SSH_KEY }}" > ~/.ssh/pm-b-infra
          chmod 600 ~/.ssh/pm-b-infra

      - name: Write backend env file
        run: |
          printf '%s\n' "${{ secrets.PM_B_INFRA_BACKEND_ENV }}" > backend.env

      - name: Write ia env file
        run: |
          printf '%s\n' "${{ secrets.PM_B_INFRA_IA_ENV }}" > ia.env

      - name: Run deploy playbook
        working-directory: ansible
        run: ansible-playbook -i inventory.ini site.yml --private-key ~/.ssh/pm-b-infra --extra-vars "component=${{ github.event.inputs.component || 'all' }}"